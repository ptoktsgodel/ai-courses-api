services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Adminpassword1!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "Adminpassword1!",
          "-Q", "SELECT 1",
          "-No"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UsersConnection: >-
        Server=sqlserver,1433;Database=users;User Id=sa;Password=Adminpassword1!;TrustServerCertificate=True
      ConnectionStrings__PaymentsConnection: >-
        Server=sqlserver,1433;Database=payments;User Id=sa;Password=Adminpassword1!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
